name: R check

# Lightweight check: confirm the Shiny app file parses as valid R.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Parse app.R
        run: Rscript -e 'invisible(parse("volva/app.R")); cat("app.R parses cleanly\n")'
